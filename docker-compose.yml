services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server:/app
      - ./data:/app/data
      - shared_data:/app/shared
    environment:
      - DATA_DIR=/app/data
      - CLIENT_PUBLIC_DIR=/app/shared
    # You can override biometric defaults here for Docker:
    # - USER_AGE=38
    # - USER_HEIGHT_CM=180
    # - USER_GENDER=male
    restart: unless-stopped

  backend-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./data:/app/data
      - shared_data:/app/shared
    environment:
      - DATA_DIR=/app/data
      - CLIENT_PUBLIC_DIR=/app/shared
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - shared_data:/app/shared
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shared_data:
